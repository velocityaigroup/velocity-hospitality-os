  <text x="740" y="845" font-size="13" fill="#0F4C75" text-anchor="middle" font-weight="bold">Reporting feeds the next decision &#8212; continuous improvement</text>
  <text x="40" y="884" font-size="11" fill="#999999">Velocity AI Group &#183; Velocity Hospitality OS &#183; agents recommend &amp; prepare; people approve anything consequential before a real system changes.</text>
