  <rect x="0" y="0" width="1480" height="900" fill="#FFFFFF"/>
  <text x="40" y="46" font-size="26" font-weight="bold" fill="#0F4C75">VELOCITY HOSPITALITY OS</text>
  <text x="40" y="72" font-size="16" fill="#555555">The Agentic Execution Loop &#8212; Inputs &#8594; Agents &#8594; Human Approval &#8594; Actions &#8594; Systems &#8594; Reporting</text>
